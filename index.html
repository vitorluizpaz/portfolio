<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vp.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Vitor Paz — frontend engineer crafting interactive, delightfully detailed web experiences."
    />
    <meta name="theme-color" content="#08080b" />
    <title>Vitor Paz — Frontend Engineer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Apply saved theme/language before paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (!t)
            t = matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
          if (t === "light") document.documentElement.classList.add("light");
          var l = localStorage.getItem("lang");
          if (l !== "en" && l !== "pt")
            l = (navigator.language || "en").toLowerCase().indexOf("pt") === 0
              ? "pt"
              : "en";
          document.documentElement.lang = l === "pt" ? "pt-BR" : "en";
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
